services:
  postgres:
    image: postgres:16-alpine
    container_name: pg-eldmatix
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=eldmatix_local
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
